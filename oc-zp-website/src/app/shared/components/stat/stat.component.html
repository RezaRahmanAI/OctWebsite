<div class="stat-root">
  <div class="stat-glow" aria-hidden="true"></div>
  <p class="stat-value">
    <ng-container *ngIf="isNumber(value); else textValue">{{ value | number: '1.0-0' }}</ng-container>
  </p>
  <p class="stat-label">{{ label }}</p>
  <p *ngIf="description" class="stat-description">{{ description }}</p>
</div>

<ng-template #textValue>{{ value }}</ng-template>
