<div class="heading" [class.heading--center]="align === 'center'">
  <p *ngIf="eyebrow" class="heading-eyebrow">
    <span class="heading-dot" aria-hidden="true"></span>
    {{ eyebrow }}
  </p>
  <h2 class="heading-title">{{ title }}</h2>
  <p *ngIf="subtitle" class="heading-subtitle" [class.heading-subtitle--center]="align === 'center'">
    {{ subtitle }}
  </p>
</div>
