<header
  class="nav-wrapper"
  [class.nav-wrapper--hidden]="isHidden()"
  [class.nav-wrapper--opaque]="!atTop()"
>
  <div class="nav-surface">
    <div class="container-responsive nav-content">
      <a routerLink="/" class="nav-logo" (click)="closeMenu()">
        <span class="nav-logo-mark">◎</span>
        <span class="nav-logo-text">
          <span class="nav-logo-primary">ObjectCanvas</span>
          <span class="nav-logo-secondary">× ZeroProgrammingBD</span>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.link"
          routerLinkActive="is-active"
          (click)="closeMenu()"
          [routerLinkActiveOptions]="{ exact: item.link === '/' }"
        >
          {{ item.label }}
        </a>
      </nav>
      <div class="nav-actions">
        <button type="button" class="nav-theme" (click)="toggleTheme()">
          <svg xmlns="http://www.w3.org/2000/svg" class="nav-theme-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M12 3v2m6.364.636l-1.414 1.414M21 12h-2m-1.636 6.364l-1.414-1.414M12 19v2m-4.95-4.95l-1.414 1.414M5 12H3m3.05-4.95l-1.414-1.414"
            />
            <circle cx="12" cy="12" r="4" stroke-width="1.5"></circle>
          </svg>
          <span>{{ theme() === 'dark' ? 'Light mode' : 'Night mode' }}</span>
        </button>
        <a routerLink="/contact" class="nav-cta">Book intro</a>
        <button type="button" class="nav-menu" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
          <span class="sr-only">Toggle navigation</span>
          <span class="nav-menu-bar" aria-hidden="true"></span>
          <span class="nav-menu-bar" aria-hidden="true"></span>
          <span class="nav-menu-bar" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </div>
  <div class="nav-backdrop" *ngIf="isMenuOpen()" (click)="closeMenu()"></div>
  <div class="nav-mobile" *ngIf="isMenuOpen()">
    <nav aria-label="Mobile navigation" class="nav-mobile-links">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.link"
        routerLinkActive="is-active"
        (click)="closeMenu()"
        [routerLinkActiveOptions]="{ exact: item.link === '/' }"
      >
        {{ item.label }}
      </a>
    </nav>
    <div class="nav-mobile-footer">
      <a routerLink="/contact" class="nav-mobile-cta" (click)="closeMenu()">Start a project</a>
    </div>
  </div>
</header>
