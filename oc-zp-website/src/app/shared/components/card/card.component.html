<article class="card-root group">
  <div class="card-halo" aria-hidden="true"></div>
  <figure *ngIf="image" class="card-image">
    <img [src]="image" [alt]="imageAlt || title" loading="lazy" />
    <figcaption *ngIf="badge" class="card-image-badge">{{ badge }}</figcaption>
  </figure>
  <div class="card-body">
    <div class="card-header" [class.card-header--offset]="image">
      <div class="card-icon">
        <ng-container *ngIf="icon; else defaultIcon">
          <span class="card-icon-text">{{ icon[0] }}</span>
        </ng-container>
        <ng-template #defaultIcon>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          </svg>
        </ng-template>
      </div>
      <span *ngIf="badge && !image" class="card-pill">{{ badge }}</span>
    </div>
    <div class="card-content">
      <h3 class="card-title">{{ title }}</h3>
      <p class="card-description" *ngIf="description">{{ description }}</p>
    </div>
    <div class="card-footer" *ngIf="link">
      <a [routerLink]="link" class="card-link">
        Explore detail
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 12h14m-7-7l7 7-7 7" />
        </svg>
      </a>
    </div>
  </div>
  <ng-content></ng-content>
</article>
