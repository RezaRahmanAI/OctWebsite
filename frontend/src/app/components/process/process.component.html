<section id="process" class="relative isolate py-24">
  <div class="mx-auto max-w-6xl px-6">
    <div class="mb-12 text-center">
      <p class="section-title">A single hybrid engine</p>
      <h2 class="mt-4 text-3xl font-semibold text-white md:text-4xl">
        How ObjectCanvas and ZeroProgramming deliver lasting change.
      </h2>
      <p class="mt-4 text-base text-slate-300 md:w-2/3 md:mx-auto">
        Every engagement couples product delivery with capability building so that your teams can sustain momentum long after launch.
      </p>
    </div>

    <div class="grid gap-6 md:grid-cols-3">
      <article
        *ngFor="let step of steps; index as i"
        class="flex h-full flex-col gap-4 rounded-3xl border border-white/5 bg-white/5 p-6"
      >
        <span class="text-xs font-semibold uppercase tracking-[0.35em] text-brand-secondary">Phase {{ i + 1 }}</span>
        <h3 class="text-xl font-semibold text-white">{{ step.title }}</h3>
        <p class="text-sm text-slate-300">{{ step.description }}</p>
        <ul class="mt-4 space-y-2 text-sm text-slate-200">
          <li *ngFor="let outcome of step.outcomes" class="flex items-start gap-2">
            <span class="mt-1 h-1.5 w-1.5 rounded-full bg-brand-primary"></span>
            {{ outcome }}
          </li>
        </ul>
      </article>
    </div>
  </div>
</section>
