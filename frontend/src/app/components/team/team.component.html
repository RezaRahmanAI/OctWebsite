<section id="team" class="relative isolate py-24">
  <div class="mx-auto max-w-6xl px-6">
    <div class="mb-12 text-center">
      <p class="section-title">Leadership and mentors</p>
      <h2 class="mt-4 text-3xl font-semibold text-white md:text-4xl">
        Cross-functional experts guiding every sprint and cohort.
      </h2>
      <p class="mt-4 text-base text-slate-300 md:w-2/3 md:mx-auto">
        Our core team blends ObjectCanvas product veterans with ZeroProgramming learning architects to keep delivery and education in lockstep.
      </p>
    </div>

    <div class="grid gap-6 md:grid-cols-4">
      <article
        *ngFor="let member of members()"
        class="group flex flex-col gap-4 rounded-3xl border border-white/5 bg-white/5 p-5 text-center transition hover:-translate-y-1 hover:border-brand-primary/40"
      >
        <img [src]="member.avatarUrl" [alt]="member.name" class="mx-auto h-28 w-28 rounded-3xl object-cover shadow-lg shadow-brand-primary/20" />
        <div>
          <h3 class="text-lg font-semibold text-white">{{ member.name }}</h3>
          <p class="text-xs uppercase tracking-[0.35em] text-brand-accent">{{ member.title }}</p>
        </div>
        <p class="text-sm text-slate-300">{{ member.bio }}</p>
        <a class="text-xs font-semibold text-brand-secondary" [href]="'mailto:' + member.email">{{ member.email }}</a>
      </article>
    </div>
  </div>
</section>
