<section id="impact" class="relative isolate">
  <div class="mx-auto max-w-6xl px-6">
    <div class="gradient-divider mb-10"></div>
    <div class="grid gap-6 rounded-3xl border border-white/5 bg-white/5 p-8 shadow-lg shadow-brand-primary/5 md:grid-cols-4">
      <div *ngFor="let metric of metrics" class="flex flex-col gap-2 rounded-2xl bg-navy-900/60 p-5">
        <span class="text-3xl font-semibold text-white">{{ metric.value }}</span>
        <span class="text-sm uppercase tracking-[0.3em] text-brand-secondary">{{ metric.label }}</span>
        <p class="text-xs text-slate-300">{{ metric.detail }}</p>
      </div>
    </div>
  </div>
</section>
