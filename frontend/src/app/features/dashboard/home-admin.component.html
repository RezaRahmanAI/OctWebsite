<div class="card">
  <div class="card-header">
    <div>
      <p class="eyebrow">Home Page</p>
      <h2 class="title">Edit hero & trust content</h2>
      <p class="muted">Update headline messaging, CTAs, testimonials, and footer CTAs for the home page.</p>
    </div>
    <button class="btn ghost" type="button" (click)="applyContent(content.homeContent())">Reset form</button>
  </div>

  <form class="grid gap-4 md:grid-cols-2" [formGroup]="form" (ngSubmit)="submit()">
    <label class="form-field">
      <span>Hero badge</span>
      <input type="text" formControlName="heroBadge" />
    </label>
    <label class="form-field">
      <span>Hero title</span>
      <input type="text" formControlName="heroTitle" />
    </label>
    <label class="form-field md:col-span-2">
      <span>Hero description</span>
      <textarea rows="2" formControlName="heroDescription"></textarea>
    </label>
    <label class="form-field">
      <span>Primary CTA label</span>
      <input type="text" formControlName="primaryLabel" />
    </label>
    <label class="form-field">
      <span>Primary CTA link</span>
      <input type="text" formControlName="primaryLink" />
    </label>
    <label class="form-field">
      <span>Secondary CTA label</span>
      <input type="text" formControlName="secondaryLabel" />
    </label>
    <label class="form-field">
      <span>Secondary CTA link</span>
      <input type="text" formControlName="secondaryLink" />
    </label>

    <label class="form-field md:col-span-2">
      <span>Trust tagline</span>
      <input type="text" formControlName="trustTagline" />
    </label>
    <label class="form-field md:col-span-2">
      <span>Partner companies (comma separated)</span>
      <textarea rows="2" formControlName="trustCompanies"></textarea>
    </label>

    <label class="form-field md:col-span-2">
      <span>Featured testimonial quote</span>
      <textarea rows="2" formControlName="testimonialQuote"></textarea>
    </label>
    <label class="form-field">
      <span>Testimonial name</span>
      <input type="text" formControlName="testimonialName" />
    </label>
    <label class="form-field">
      <span>Testimonial title</span>
      <input type="text" formControlName="testimonialTitle" />
    </label>

    <div class="md:col-span-2 grid gap-4 md:grid-cols-2">
      <div class="space-y-3">
        <p class="eyebrow">Closing CTA · Business</p>
        <label class="form-field">
          <span>Title</span>
          <input type="text" formControlName="closingBusinessTitle" />
        </label>
        <label class="form-field">
          <span>Description</span>
          <textarea rows="2" formControlName="closingBusinessDescription"></textarea>
        </label>
        <label class="form-field">
          <span>Button label</span>
          <input type="text" formControlName="closingBusinessLabel" />
        </label>
        <label class="form-field">
          <span>Button link</span>
          <input type="text" formControlName="closingBusinessLink" />
        </label>
      </div>

      <div class="space-y-3">
        <p class="eyebrow">Closing CTA · Academy</p>
        <label class="form-field">
          <span>Title</span>
          <input type="text" formControlName="closingAcademyTitle" />
        </label>
        <label class="form-field">
          <span>Description</span>
          <textarea rows="2" formControlName="closingAcademyDescription"></textarea>
        </label>
        <label class="form-field">
          <span>Button label</span>
          <input type="text" formControlName="closingAcademyLabel" />
        </label>
        <label class="form-field">
          <span>Button link</span>
          <input type="text" formControlName="closingAcademyLink" />
        </label>
      </div>
    </div>

    <div class="md:col-span-2 flex flex-wrap gap-2">
      <button class="btn primary" type="submit" [disabled]="loading()">Save home page</button>
      <button class="btn ghost" type="button" (click)="applyContent(content.homeContent())">Discard changes</button>
    </div>
  </form>
</div>
