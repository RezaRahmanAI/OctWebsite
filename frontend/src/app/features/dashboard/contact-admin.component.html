<div class="card">
  <div class="card-header flex items-center justify-between">
    <div>
      <p class="text-xs uppercase tracking-[0.2em] text-primary">Contact Page</p>
      <h2 class="text-lg font-semibold text-slate-900">Edit Contact Content</h2>
    </div>
    <button class="btn primary" type="button" (click)="submit()" [disabled]="loading()">Save</button>
  </div>

  <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">Header Eyebrow</span>
        <input class="input" formControlName="headerEyebrow" placeholder="Contact" />
      </label>
      <label class="form-control">
        <span class="label">Header Title</span>
        <input class="input" formControlName="headerTitle" placeholder="Partner with ObjectCanvas" />
      </label>
      <label class="form-control md:col-span-2">
        <span class="label">Header Subtitle</span>
        <textarea class="input" rows="2" formControlName="headerSubtitle"></textarea>
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">Hero Meta Line</span>
        <input class="input" formControlName="heroMetaLine" placeholder="Dhaka · Rajshahi · Remote" />
      </label>
      <label class="form-control">
        <span class="label">Primary CTA Label</span>
        <input class="input" formControlName="primaryCtaLabel" placeholder="Hire Our Team" />
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">Primary CTA Link</span>
        <input class="input" formControlName="primaryCtaLink" placeholder="/contact#consultation" />
      </label>
      <label class="form-control">
        <span class="label">Consultation Options</span>
        <textarea class="input" rows="2" formControlName="consultationOptions"></textarea>
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">Regional Support</span>
        <input class="input" formControlName="regionalSupport" />
      </label>
      <label class="form-control">
        <span class="label">Response Time</span>
        <input class="input" formControlName="responseTime" />
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">NDA Label</span>
        <input class="input" formControlName="ndaLabel" />
      </label>
      <label class="form-control">
        <span class="label">Headquarters</span>
        <textarea class="input" rows="2" formControlName="headquarters"></textarea>
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-3">
      <label class="form-control md:col-span-1">
        <span class="label">Offices Eyebrow</span>
        <input class="input" formControlName="officesEyebrow" />
      </label>
      <label class="form-control md:col-span-1">
        <span class="label">Offices Title</span>
        <input class="input" formControlName="officesTitle" />
      </label>
      <label class="form-control md:col-span-1">
        <span class="label">Offices Description</span>
        <input class="input" formControlName="officesDescription" />
      </label>
    </div>

    <div class="space-y-3" formArrayName="offices">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-semibold text-slate-800">Office Locations</h3>
        <button class="btn ghost" type="button" (click)="addOffice()">Add Office</button>
      </div>
      <div class="space-y-4">
        <div class="grid gap-3 rounded-lg border border-slate-200 p-4" *ngFor="let control of offices.controls; let i = index" [formGroupName]="i">
          <div class="grid gap-3 md:grid-cols-2">
            <label class="form-control">
              <span class="label">Name</span>
              <input class="input" formControlName="name" />
            </label>
            <label class="form-control">
              <span class="label">Headline</span>
              <input class="input" formControlName="headline" />
            </label>
          </div>
          <label class="form-control">
            <span class="label">Address</span>
            <textarea class="input" rows="2" formControlName="address"></textarea>
          </label>
          <div class="flex items-center gap-3">
            <label class="form-control flex-1">
              <span class="label">Image URL</span>
              <input class="input" formControlName="imageUrl" />
            </label>
            <button class="btn ghost" type="button" (click)="removeOffice(i)">Remove</button>
          </div>
        </div>
      </div>
    </div>

    <div class="space-y-3" formArrayName="emails">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-semibold text-slate-800">Emails</h3>
        <button class="btn ghost" type="button" (click)="addEmail()">Add Email</button>
      </div>
      <div class="space-y-2">
        <div class="flex items-center gap-2" *ngFor="let control of emails.controls; let i = index">
          <input class="input flex-1" [formControlName]="i" />
          <button class="btn ghost" type="button" (click)="removeEmail(i)">Remove</button>
        </div>
      </div>
    </div>

    <div class="space-y-3" formArrayName="formOptions">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-semibold text-slate-800">Form Options</h3>
        <button class="btn ghost" type="button" (click)="addFormOption()">Add Option</button>
      </div>
      <div class="space-y-2">
        <div class="flex items-center gap-2" *ngFor="let control of formOptions.controls; let i = index">
          <input class="input flex-1" [formControlName]="i" />
          <button class="btn ghost" type="button" (click)="removeFormOption(i)">Remove</button>
        </div>
      </div>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">Hero Video File Name</span>
        <input class="input" formControlName="heroVideoFileName" placeholder="Existing file name or URL" />
      </label>
      <label class="form-control">
        <span class="label">Upload Hero Video</span>
        <input class="input" type="file" accept="video/*" (change)="onHeroVideoSelected($event)" />
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="form-control">
        <span class="label">Map Embed URL</span>
        <input class="input" formControlName="mapEmbedUrl" />
      </label>
      <label class="form-control">
        <span class="label">Map Title</span>
        <input class="input" formControlName="mapTitle" />
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <div class="space-y-3" formArrayName="businessHours">
        <div class="flex items-center justify-between">
          <h3 class="text-sm font-semibold text-slate-800">Business Hours</h3>
          <button class="btn ghost" type="button" (click)="addBusinessHour()">Add</button>
        </div>
        <div class="space-y-2">
          <div class="flex items-center gap-2" *ngFor="let control of businessHours.controls; let i = index">
            <input class="input flex-1" [formControlName]="i" />
            <button class="btn ghost" type="button" (click)="removeBusinessHour(i)">Remove</button>
          </div>
        </div>
      </div>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="form-control">
          <span class="label">Profile Download Label</span>
          <input class="input" formControlName="profileDownloadLabel" />
        </label>
        <label class="form-control">
          <span class="label">Profile Download URL</span>
          <input class="input" formControlName="profileDownloadUrl" />
        </label>
      </div>
    </div>

    <div class="flex justify-end">
      <button class="btn primary" type="submit" [disabled]="loading()">Save Contact Page</button>
    </div>
  </form>
</div>
