<div class="card">
  <div class="flex items-center justify-between">
    <h2>Zero Programming Tracks</h2>
    <button class="btn" type="button" (click)="resetForm()">New Track</button>
  </div>

  <div class="grid gap-4 md:grid-cols-[2fr_3fr]">
    <div class="space-y-3">
      <div *ngFor="let track of tracks()" class="flex items-center justify-between rounded border border-slate-200 bg-slate-50 px-3 py-2">
        <div>
          <p class="text-sm font-semibold">{{ track.title }}</p>
          <p class="text-xs text-slate-600">{{ track.ageRange }} · {{ track.duration }}</p>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn" type="button" (click)="select(track.id)">Edit</button>
          <button class="btn danger" type="button" (click)="delete(track.id)">Delete</button>
        </div>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div class="grid gap-3 md:grid-cols-2">
        <label class="form-control">
          <span>Title</span>
          <input formControlName="title" />
        </label>
        <label class="form-control">
          <span>Slug</span>
          <input formControlName="slug" />
        </label>
        <label class="form-control">
          <span>Age range</span>
          <input formControlName="ageRange" />
        </label>
        <label class="form-control">
          <span>Duration</span>
          <input formControlName="duration" />
        </label>
        <label class="form-control">
          <span>Price label</span>
          <input formControlName="priceLabel" />
        </label>
        <label class="form-control">
          <span>Audience</span>
          <input formControlName="audience" />
        </label>
        <label class="form-control">
          <span>Format</span>
          <input formControlName="format" />
        </label>
        <label class="form-control md:col-span-2">
          <span>Summary</span>
          <textarea formControlName="summary" rows="3"></textarea>
        </label>
        <label class="form-control">
          <span>Hero video</span>
          <input type="file" accept="video/*" (change)="onHeroVideoSelected($event)" />
          <p class="text-xs text-slate-600" *ngIf="form.value.heroVideoFileName">Current: {{ form.value.heroVideoFileName }}</p>
        </label>
        <label class="form-control">
          <span>Hero poster</span>
          <input type="file" accept="image/*" (change)="onHeroPosterSelected($event)" />
          <p class="text-xs text-slate-600" *ngIf="form.value.heroPosterFileName">Current: {{ form.value.heroPosterFileName }}</p>
        </label>
        <label class="form-control">
          <span>CTA label</span>
          <input formControlName="callToActionLabel" />
        </label>
        <label class="form-control flex items-center gap-2">
          <input type="checkbox" formControlName="active" /> Active
        </label>
      </div>

      <div class="divider">Highlights</div>
      <div class="space-y-2" formArrayName="highlights">
        <div class="flex items-center gap-2" *ngFor="let control of highlights.controls; let i = index">
          <input class="flex-1" [formControlName]="i" />
          <button type="button" class="btn danger" (click)="removeHighlight(i)">Remove</button>
        </div>
        <button type="button" class="btn" (click)="addHighlight()">Add highlight</button>
      </div>

      <div class="divider">Learning outcomes</div>
      <div class="space-y-2" formArrayName="learningOutcomes">
        <div class="flex items-center gap-2" *ngFor="let control of learningOutcomes.controls; let i = index">
          <input class="flex-1" [formControlName]="i" />
          <button type="button" class="btn danger" (click)="removeOutcome(i)">Remove</button>
        </div>
        <button type="button" class="btn" (click)="addOutcome()">Add outcome</button>
      </div>

      <div class="divider">Levels</div>
      <div class="space-y-3" formArrayName="levels">
        <div class="card space-y-3" *ngFor="let level of levels.controls; let i = index" [formGroupName]="i">
          <div class="flex items-center justify-between">
            <h3 class="text-base font-semibold">Level {{ i + 1 }}</h3>
            <button type="button" class="btn danger" (click)="removeLevel(i)">Remove</button>
          </div>
          <label class="form-control">
            <span>Title</span>
            <input formControlName="title" />
          </label>
          <label class="form-control">
            <span>Duration</span>
            <input formControlName="duration" />
          </label>
          <label class="form-control">
            <span>Description</span>
            <textarea formControlName="description" rows="2"></textarea>
          </label>
          <label class="form-control">
            <span>Project</span>
            <input formControlName="project" />
          </label>
          <label class="form-control">
            <span>Image</span>
            <input type="file" accept="image/*" (change)="onLevelImageSelected(i, $event)" />
            <p class="text-xs text-slate-600" *ngIf="level.value.image">Current: {{ level.value.image }}</p>
          </label>

          <div>
            <p class="font-semibold">Tools</p>
            <div class="space-y-2" formArrayName="tools">
              <div class="flex items-center gap-2" *ngFor="let tool of getLevelTools(i).controls; let t = index">
                <input class="flex-1" [formControlName]="t" />
                <button type="button" class="btn danger" (click)="removeTool(i, t)">Remove</button>
              </div>
              <button type="button" class="btn" (click)="addTool(i)">Add tool</button>
            </div>
          </div>

          <div>
            <p class="font-semibold">Level outcomes</p>
            <div class="space-y-2" formArrayName="outcomes">
              <div class="flex items-center gap-2" *ngFor="let outcome of getLevelOutcomes(i).controls; let o = index">
                <input class="flex-1" [formControlName]="o" />
                <button type="button" class="btn danger" (click)="removeOutcomeFromLevel(i, o)">Remove</button>
              </div>
              <button type="button" class="btn" (click)="addOutcomeToLevel(i)">Add outcome</button>
            </div>
          </div>
        </div>
        <button type="button" class="btn" (click)="addLevel()">Add level</button>
      </div>

      <div class="divider">Admission steps</div>
      <div class="space-y-2" formArrayName="admissionSteps">
        <div class="grid gap-2 md:grid-cols-[1fr_2fr_auto]" *ngFor="let step of admissionSteps.controls; let i = index" [formGroupName]="i">
          <input formControlName="title" placeholder="Title" />
          <input formControlName="description" placeholder="Description" />
          <button type="button" class="btn danger" (click)="removeAdmissionStep(i)">Remove</button>
        </div>
        <button type="button" class="btn" (click)="addAdmissionStep()">Add step</button>
      </div>

      <div class="flex justify-end">
        <button type="submit" class="btn" [disabled]="loading()">Save Track</button>
      </div>
    </form>
  </div>
</div>
