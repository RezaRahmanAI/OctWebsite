<section class="section-padding bg-white">
  <div class="container-wide">
    <app-section-header
      [eyebrow]="data.header.eyebrow"
      [title]="data.header.title"
      [subtitle]="data.header.subtitle" />
    <div class="mt-12 grid gap-6 md:grid-cols-5">
      <div
        *ngFor="let step of data.steps; let i = index"
        class="relative rounded-3xl border border-slate-100 bg-white p-6 text-center shadow-sm"
      >
        <span class="text-xs font-semibold uppercase tracking-[0.3em] text-accent">Step {{ i + 1 }}</span>
        <h4 class="mt-3 text-lg font-semibold text-primary">{{ step.step }}</h4>
        <p class="mt-3 text-sm text-slate-600">{{ step.detail }}</p>
      </div>
    </div>
  </div>
</section>
