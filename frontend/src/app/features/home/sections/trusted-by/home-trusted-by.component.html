<section class="trusted-section" aria-labelledby="trusted-by-heading">
  <div class="trusted-card">
    <div class="trusted-header">
      <span class="trusted-badge">Trusted by</span>
      <div class="trusted-line"></div>
      <p id="trusted-by-heading" class="trusted-tagline">
        {{ tagline || 'Engineering teams at fast-moving companies' }}
      </p>
      <p class="trusted-subtext" *ngIf="companies?.length">
        Featuring {{ (companies ?? []).join(' • ') }}
      </p>
    </div>

    <div class="marquee" aria-label="Carousel of partner company logos">
      <div class="marquee-track" style="animation-duration: 55s">
        <ng-container *ngFor="let logo of logoMarquee">
          <div class="logo-chip" role="img" [attr.aria-label]="logo.name">
            <div class="logo-image-wrapper">
              <img
                class="logo-image"
                loading="lazy"
                [src]="logo.src"
                [alt]="logo.name + ' logo'"
                [style.width.px]="logo.width || 150"
              />
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</section>
