<section class="section-padding">
  <div class="container-wide grid gap-12 lg:grid-cols-[1.1fr_0.9fr] lg:items-center">
    <div class="order-2 lg:order-1">
      <app-section-header
        [eyebrow]="data.header.eyebrow"
        [title]="data.header.title"
        [subtitle]="data.header.subtitle"
      ></app-section-header>
      <div class="mt-8 grid gap-4 text-sm text-slate-600">
        <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm">
          <h4 class="text-lg font-semibold text-primary">{{ data.headquarters.title }}</h4>
          <p class="mt-2">{{ data.headquarters.location }}</p>
          <p class="mt-1 text-xs uppercase tracking-[0.3em] text-slate-500">{{ data.headquarters.address }}</p>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm">
            <h4 class="text-sm font-semibold uppercase tracking-[0.3em] text-primary">Markets Served</h4>
            <p class="mt-3">{{ data.marketsServed }}</p>
          </div>
          <div class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm">
            <h4 class="text-sm font-semibold uppercase tracking-[0.3em] text-primary">Specialized Verticals</h4>
            <p class="mt-3">{{ data.verticals }}</p>
          </div>
        </div>
      </div>
    </div>    
  </div>
</section>
