<section class="section-padding">
  <div class="container-wide">
    <div class="rounded-3xl border border-slate-200/70 bg-white/80 p-8 shadow-glow">
      <div class="flex flex-wrap items-center justify-between gap-6">        
        <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
          <div *ngFor="let stat of data.stats" class="rounded-2xl bg-slate-50 p-4 text-center shadow-sm">
            <span class="text-3xl font-semibold text-primary">{{ stat | formatStat }}</span>
            <p class="mt-2 text-xs font-semibold uppercase tracking-wide text-slate-500">
              {{ stat.label }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
