<section class="section-padding bg-white">
  <div class="container-wide">
    <app-section-header
      [eyebrow]="data.header.eyebrow"
      [title]="data.header.title"
      [subtitle]="data.header.subtitle"
    ></app-section-header>
    <div class="mt-12 grid gap-6 md:grid-cols-3">
      <article *ngFor="let insight of data.items" class="flex h-full flex-col justify-between rounded-3xl border border-slate-100 bg-white p-8 shadow-glow transition hover:-translate-y-2 hover:shadow-2xl">
        <div>
          <span class="text-xs font-semibold uppercase tracking-[0.3em] text-accent">{{ insight.category }}</span>
          <h3 class="mt-4 text-2xl font-semibold text-primary">{{ insight.title }}</h3>
          <p class="mt-4 text-sm text-slate-600">{{ insight.summary }}</p>
        </div>
        <div class="mt-6 flex items-center justify-between text-sm text-slate-500">
          <span>{{ insight.readTime }}</span>
          <a routerLink="/insights" class="inline-flex items-center gap-2 text-sm font-semibold text-primary transition hover:translate-x-1">
            Read More
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
            </svg>
          </a>
        </div>
      </article>
    </div>
    <div class="mt-10 flex justify-center">
      <a routerLink="/insights" class="inline-flex items-center gap-2 rounded-full border border-primary/20 px-6 py-3 text-sm font-semibold text-primary transition hover:border-primary">
        Read More Articles
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
        </svg>
      </a>
    </div>
  </div>
</section>
