<section class="section-padding bg-academy-gradient" appScrollReveal>
  <div class="container-wide relative p-10 text-white">
    <div class="grid gap-16 lg:grid-cols-[1.05fr_0.95fr] lg:items-start lg:gap-16 xl:gap-20 h-full lg:pb-10">
      <div
        class="lg:sticky lg:top-16 lg:self-start lg:max-w-xl lg:pt-2"
        appScrollReveal
        [revealOffset]="28"
      >
        <app-section-header
          [eyebrow]="data.header.eyebrow"
          [title]="data.header.title"
        ></app-section-header>
        <div class="mt-8 flex flex-wrap gap-3">
          <span *ngFor="let category of data.categories" class="rounded-full bg-white/15 px-4 py-2 text-xs font-semibold uppercase tracking-wide">
            {{ category }}
          </span>
        </div>
        <div class="mt-10 grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
          <div *ngFor="let stat of data.stats; let i = index" class="rounded-3xl bg-white/10 p-6 text-center" appScrollReveal [revealDelay]="i * 0.04" [revealOffset]="26">
            <span class="text-3xl font-semibold">{{ stat | formatStat }}</span>
            <p class="mt-2 text-xs font-semibold uppercase tracking-wide text-white/80">{{ stat.label }}</p>
          </div>
        </div>
        <div class="mt-10 flex flex-wrap gap-4">
          <a routerLink="/academy" class="inline-flex items-center justify-center rounded-full bg-white px-6 py-3 text-sm font-semibold text-primary shadow-lg shadow-white/20 transition hover:-translate-y-0.5">
            Browse All Courses
          </a>
          <a routerLink="/academy" fragment="demo" class="inline-flex items-center justify-center rounded-full border border-white/60 px-6 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5">
            Watch Free Demo Class
          </a>
        </div>
      </div>
      <div class="space-y-6 pr-4 lg:pr-4 lg:pt-6">
        <article
          *ngFor="let program of programCards; let i = index"
          class="group relative overflow-hidden rounded-3xl border border-white/25 bg-white/10 p-6 shadow-xl backdrop-blur"
          appScrollReveal
          [revealDelay]="i * 0.1"
        >
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.3em] text-white/60">Academy Program</p>
              <h3 class="mt-3 text-2xl font-semibold">{{ program.title }}</h3>
              <p class="mt-2 text-sm text-white/80">{{ program.summary }}</p>
            </div>
            <span class="text-3xl">{{ program.icon }}</span>
          </div>
          <p class="mt-4 text-xs font-semibold uppercase tracking-[0.3em] text-white/60">{{ program.audience }}</p>
          <ul class="mt-4 space-y-2 text-sm text-white/90">
            <li *ngFor="let highlight of program.highlights" class="flex items-start gap-3">
              <span class="mt-1 inline-flex h-6 w-6 items-center justify-center rounded-full bg-white/10 text-xs font-semibold">•</span>
              <span>{{ highlight }}</span>
            </li>
          </ul>
          <div class="mt-6 flex flex-wrap gap-3">
            <a
              [routerLink]="program.cta.routerLink"
              [fragment]="program.cta.fragment"
              class="inline-flex items-center justify-center rounded-full bg-white px-4 py-2 text-xs font-semibold uppercase tracking-wide text-primary shadow-lg shadow-white/25 transition duration-300 hover:-translate-y-0.5"
            >
              {{ program.cta.label }}
            </a>
            <a
              routerLink="/academy"
              fragment="courses"
              class="inline-flex items-center justify-center rounded-full border border-white/40 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-white transition duration-300 hover:-translate-y-0.5"
            >
              All Courses
            </a>
          </div>
          <div class="pointer-events-none absolute inset-0 opacity-0 transition duration-300 group-hover:opacity-100 group-hover:bg-white/5"></div>
        </article>
        <ul class="space-y-3 text-sm text-white/80">
          <li *ngFor="let benefit of data.benefits" class="flex items-start gap-3"><span class="mt-1 text-lg">✓</span>{{ benefit }}</li>
        </ul>
      </div>
    </div>
    <div class="absolute inset-0 rounded-[36px] overflow-hidden pointer-events-none"></div>
  </div>
</section>
