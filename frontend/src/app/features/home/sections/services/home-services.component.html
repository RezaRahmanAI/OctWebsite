<section class="section-padding bg-white" id="services" appScrollReveal>
  <div class="container-wide">
    <app-section-header
      [eyebrow]="data.header.eyebrow"
      [title]="data.header.title"
      [subtitle]="data.header.subtitle"
    ></app-section-header>
    <div class="mt-12 grid gap-6 md:grid-cols-2 xl:grid-cols-4">
      <article
        *ngFor="let service of data.items; let i = index"
        class="service-card group"
        [ngClass]="['service-card-' + i, service.featured ? 'ring-2 ring-accent/40' : '']"
        appScrollReveal
        [revealDelay]="i * 0.08"
        [revealOffset]="40"
      >
        <div class="service-overlay" aria-hidden="true"></div>
        <div class="service-content">
          <h3 class="service-title">{{ service.title }}</h3>
          <a
            routerLink="/services"
            class="service-explore"
            [attr.aria-label]="'Explore ' + service.title + ' details'"
          >
            Explore
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
            </svg>
          </a>
        </div>
      </article>
    </div>
  </div>
</section>
