<div class="home-sections" [class.snap-active]="snapEnabled()">
  <section class="home-section">
    <app-home-hero [hero]="heroData()" [videoSrc]="heroVideoSrc()" [videoPoster]="heroVideoPoster()" />
  </section>

  <section class="home-section">
    <app-home-trust [data]="mergedHome().trust"></app-home-trust>
  </section>

  <section class="home-section">
    <app-home-services [header]="mergedHome().services.header" />
  </section>

  <section class="home-section">
    <app-product-showcase />
  </section>

  <section class="home-section">
    <app-home-methodology [data]="mergedHome().methodology" />
  </section>

  <section class="home-section">
    <app-home-collaboration [data]="mergedHome().collaboration" />
  </section>

  <section class="home-section">
    <app-home-academy [data]="mergedHome().academy" />
  </section>

  <section class="home-section">
    <app-tech-stack />
  </section>

  <section class="home-section">
    <app-home-testimonials
      [header]="mergedHome().testimonials.header"
      [testimonials]="mergedHome().testimonials.items"
    />
  </section>

  <section class="home-section">
    <app-home-insights [data]="mergedHome().insights" [posts]="featuredPosts()" />
  </section>

  <section>
    <app-home-closing-ctas [data]="mergedHome().closingCtas" />
  </section>
</div>
